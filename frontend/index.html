<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Chunk Upload Test</title>

    <style>
        #progressContainer {
            width: 300px;
            height: 20px;
            border: 1px solid #000;
            margin-top: 10px;
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: blue;
            transition: width 0.2s ease;
        }
    </style>
</head>

<body>
    <input type="file" id="fileInput" />
    <button id="uploadBtn">Upload</button>

    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>

    <pre id="log"></pre>

    <script>
        const API_BASE = "http://localhost:5000";

        const logEl = document.getElementById("log");
        const progressBar = document.getElementById("progressBar");

        const log = (msg) => {
            logEl.textContent += msg + "\n";
        };

        const setProgress = (percent) => {
            progressBar.style.width = percent + "%";
        };

        const CHUNK_SIZE = 5 * 1024 * 1024;

        function getChunks(file) {
            const chunks = [];
            let start = 0;

            while (start < file.size) {
                chunks.push(file.slice(start, start + CHUNK_SIZE));
                start += CHUNK_SIZE;
            }

            return chunks;
        }

        function createFileId(file) {
            return `${file.name}-${file.size}-${file.lastModified}`;
        }

        async function uploadChunks(file) {
            const chunks = getChunks(file);
            const fileId = createFileId(file);

            log(`chunks: ${chunks.length}`);

            for (let i = 0; i < chunks.length; i++) {
                const form = new FormData();

                form.append("chunk", chunks[i]);
                form.append("fileId", fileId);
                form.append("index", String(i));
                form.append("total", String(chunks.length));

                const res = await fetch(`${API_BASE}/upload-chunk`, {
                    method: "POST",
                    body: form
                });

                if (!res.ok) {
                    throw new Error(`Chunk ${i} failed`);
                }

                const percent = Math.round(((i + 1) / chunks.length) * 100);
                setProgress(percent);

                log(`uploaded chunk ${i + 1}/${chunks.length}`);
            }

            return fileId;
        }

        async function finalizeUpload(fileId, fileName) {
            const res = await fetch(`${API_BASE}/finalize-upload`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    fileId,
                    fileName
                })
            });

            if (!res.ok) {
                throw new Error("Finalize failed");
            }

            return await res.json();
        }

        document.getElementById("uploadBtn").onclick = async () => {
            const file = document.getElementById("fileInput").files[0];
            if (!file) return;
            if (file.size > 20 * 1024 * 1024) {
                log("File too large. Max size is 20MB.");
                return;
            }

            try {
                log("starting chunk upload...");

                const fileId = await uploadChunks(file);

                log("finalizing...");

                const result = await finalizeUpload(fileId, file.name);

                setProgress(100);

                log("done:");
                log(JSON.stringify(result, null, 2));

                log(JSON.stringify({
                    url: result.secure_url,
                    public_id: result.public_id
                }, null, 2));

            } catch (err) {
                log("error:");
                log(err.message);
            }
        };
    </script>
</body>

</html>
